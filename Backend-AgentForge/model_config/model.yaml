meta:
  name: agentforge-llm-defaults
  version: 1.0.0
  description: Defaults del LLM. Cada agente puede sobrescribir esto en la DB (tabla agents).
  updated_at: 2026-06-14

llm:
  provider: openai
  model: gpt-4.1
  temperature: 0
  # max_tokens, top_p, timeout — habilitar cuando se necesiten

memory:
  token_limit: 3000
  history_messages: 30
